      # - name: Trigger tap autobump
      #   run: |
      #     gh workflow run tap-autobump.yml --repo lighthouse-computer/homebrew-tap
      #   env:
      #     GH_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
      # ─────────────────────────────────────────────────────────────────────
