name: build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          sw_vers
          swift --version

      - name: Build (debug)
        run: swift build -c debug

      - name: Build (release)
        run: swift build -c release

      - name: Assemble app bundle
        run: ./Scripts/build_app.sh

      - name: Verify code signature
        run: codesign --verify --verbose=2 build/Beacon.app
